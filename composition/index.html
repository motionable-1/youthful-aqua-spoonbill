<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Dog's Journey - Main Composition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      background: #0d0c0f;
      --gold: #e2be84;
      --gold-dark: #b89456;
      --parchment: #fcfaf7;
      --charcoal: #151419;
      --font-serif: 'Playfair Display', serif;
      --font-sans: 'Manrope', sans-serif;
      font-kerning: normal;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0d0c0f;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Core 9:16 Portrait Canvas */
    #stage {
      position: relative;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #0d0c0f;
      box-shadow: 0 50px 150px rgba(0, 0, 0, 0.8);
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    /* Global Aesthetic Vignette & Cinematic Overlay */
    .global-frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      border: 32px solid var(--charcoal);
      box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.9);
      background: radial-gradient(circle at center, transparent 30%, rgba(13, 12, 15, 0.45) 100%);
    }

    .global-grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 998;
      opacity: 0.04;
      background-image: radial-gradient(rgba(255, 255, 255, 0.8) 1px, transparent 1px);
      background-size: 8px 8px;
    }

    /* Video Moment Containers (Clips) */
    .scene-clip {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      transform-origin: center center;
    }

    /* Visual Background Support Plates */
    .plate-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: scale(1.1);
      will-change: transform;
    }

    .plate-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.68) contrast(1.02);
    }

    /* Overlays to secure text readability */
    .scenic-vignette {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, 
        rgba(13, 12, 15, 0.92) 0%, 
        rgba(13, 12, 15, 0.5) 45%, 
        rgba(13, 12, 15, 0.1) 100%);
      pointer-events: none;
    }

    /* Typography Design System */
    .editorial-layout {
      position: absolute;
      left: 100px;
      right: 100px;
      bottom: 220px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
    }

    /* Double-masked text line reveal block */
    .masked-line-wrapper {
      overflow: hidden;
      margin-bottom: 12px;
      display: flex;
    }

    .masked-text-line {
      font-family: var(--font-serif);
      color: var(--parchment);
      font-size: 58px;
      font-weight: 400;
      line-height: 1.15;
      letter-spacing: -0.01em;
      transform: translate3d(0, 110%, 0) rotate(2deg);
      opacity: 0;
      filter: blur(8px);
      transform-origin: left bottom;
      will-change: transform, opacity, filter;
      text-wrap: balance;
    }

    .masked-text-line.highlight {
      color: var(--gold);
      font-style: italic;
      font-weight: 400;
    }

    /* Subtitle or Scene Label */
    .scene-meta {
      font-family: var(--font-sans);
      color: var(--gold-dark);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 28px;
      opacity: 0;
      transform: translate3d(0, 20px, 0);
      will-change: transform, opacity;
    }

    /* Scene-Specific Custom VFX */
    
    /* Scene 1: Gold framing accent */
    .gold-framing {
      position: absolute;
      inset: 60px;
      border: 1px solid rgba(226, 190, 132, 0.16);
      border-radius: 4px;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transform: scale(0.96);
      will-change: transform, opacity;
    }

    /* Scene 2: Geometric Dial */
    .compass-dial-container {
      position: absolute;
      left: 50%;
      top: 36%;
      transform: translate(-50%, -50%) scale(0.85);
      width: 600px;
      height: 600px;
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      will-change: transform, opacity;
    }

    .compass-dial {
      width: 100%;
      height: 100%;
      opacity: 0.15;
      stroke-dasharray: 8 8;
    }

    .compass-ring-solid {
      width: 100%;
      height: 100%;
      opacity: 0.08;
    }

    /* Scene 3: Sparkles Particle Overlay */
    .particle-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      will-change: opacity;
    }

    .sparkle-dot {
      position: absolute;
      width: 6px;
      height: 6px;
      background: radial-gradient(circle, #fff 10%, var(--gold) 80%);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--gold);
      opacity: 0;
      will-change: transform, opacity;
    }

    /* Scene 4: Warm fireplace light pulse */
    .fireplace-glow {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle at bottom right, rgba(226, 120, 40, 0.22) 0%, transparent 70%);
      pointer-events: none;
      z-index: 3;
      opacity: 0;
      will-change: opacity;
    }

    /* Scene 5: Beautiful Final Logo & Layout */
    .end-card-layout {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 80px;
      z-index: 10;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 50px;
      opacity: 0;
      transform: scale(0.85);
      will-change: transform, opacity;
    }

    .logo-path {
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      will-change: stroke-dashoffset;
    }

    .logo-path-nose {
      opacity: 0;
      transform: scale(0.5);
      transform-origin: 50px 58px;
      will-change: transform, opacity;
    }

    .end-headline {
      font-family: var(--font-serif);
      color: var(--parchment);
      font-size: 68px;
      font-weight: 500;
      line-height: 1.25;
      margin-bottom: 12px;
      opacity: 0;
      transform: translate3d(0, 40px, 0);
      filter: blur(8px);
      will-change: transform, opacity, filter;
    }

    .end-sub {
      font-family: var(--font-sans);
      color: var(--gold-dark);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0;
      transform: translate3d(0, 20px, 0);
      will-change: transform, opacity;
    }

    /* Delicate divider line at the end */
    .end-divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(226, 190, 132, 0.4), transparent);
      margin-bottom: 24px;
      opacity: 0;
      transform: scaleX(0.1);
      will-change: transform, opacity;
    }
  </style>
</head>
<body>

  <!-- Root Canvas Wrapper -->
  <div
    id="stage"
    data-composition-id="Main"
    data-start="0"
    data-duration="20"
    data-width="1080"
    data-height="1920"
    data-motionabl-fps="30"
  >
    
    <!-- Permanent Cinematic Film Texture Filters -->
    <div class="global-frame" aria-hidden="true"></div>
    <div class="global-grain" aria-hidden="true"></div>

    <!-- DECLARATIVE AUDIO CHANNELS (Declarative volume & starts) -->
    <!-- Soundbed -->
    <audio
      id="bg-music"
      src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/music/1780425874525_uwd0itr87_music_A_warm__quiet__slow_.mp3"
      preload="auto"
      data-start="0"
      data-duration="20"
      data-track-index="1"
      data-volume="0.14"
    ></audio>

    <!-- Storyteller Voiceover Narration -->
    <audio
      id="voiceover"
      src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/audio/1780425857631_b8xu3y8gl9t_JBFqnCBs_A_friend_isn_t_just_.mp3"
      preload="auto"
      data-start="0.4"
      data-duration="18.442"
      data-track-index="2"
      data-volume="1.0"
    ></audio>

    <!-- Transition Sound Effect 1 (Scene 1 to 2 transition) -->
    <audio
      id="sfx-trans-1"
      src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/sfx/1780426016424_d8lgqqitkr8_sfx_Cinematic_soft_transition_whoo.mp3"
      preload="auto"
      data-start="3.4"
      data-duration="3"
      data-track-index="3"
      data-volume="0.25"
    ></audio>

    <!-- Transition Sound Effect 2 (Scene 3 to 4 transition - with harmless clip query suffix) -->
    <audio
      id="sfx-trans-2"
      src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/sfx/1780426016424_d8lgqqitkr8_sfx_Cinematic_soft_transition_whoo.mp3?clip=2"
      preload="auto"
      data-start="11.4"
      data-duration="3"
      data-track-index="3"
      data-volume="0.25"
    ></audio>


    <!-- ========================================== -->
    <!-- SCENE 1: THE OPENER (0.0s - 4.2s) -->
    <!-- ========================================== -->
    <div
      id="scene-1"
      class="clip scene-clip"
      data-start="0"
      data-duration="4.2"
      data-track-index="1"
    >
      <div class="plate-container s1-plate">
        <img class="plate-img" src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/dogs-story/1780425999472_bzky4x2u64e_dog_loyalty.png" alt="" />
        <div class="scenic-vignette"></div>
      </div>
      
      <!-- Frame line accent -->
      <div class="gold-framing s1-frame" aria-hidden="true"></div>

      <div class="editorial-layout">
        <div class="scene-meta s1-meta">THE PROMISE</div>
        <div class="masked-line-wrapper">
          <div class="masked-text-line s1-line-1">A friend isn't just</div>
        </div>
        <div class="masked-line-wrapper">
          <div class="masked-text-line s1-line-2 highlight">someone to talk to.</div>
        </div>
      </div>
    </div>


    <!-- ========================================== -->
    <!-- SCENE 2: THE SILENT BOND (3.8s - 8.4s) -->
    <!-- ========================================== -->
    <div
      id="scene-2"
      class="clip scene-clip"
      data-start="3.8"
      data-duration="4.6"
      data-track-index="2"
    >
      <div class="plate-container s2-plate">
        <img class="plate-img" src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/dogs-story/1780426002850_4f4isqcne35_dog_paw.png" alt="" />
        <div class="scenic-vignette"></div>
      </div>

      <!-- Rotating Dial behind the text and over the paws -->
      <div class="compass-dial-container" aria-hidden="true">
        <svg viewBox="0 0 100 100" class="compass-ring-solid">
          <circle cx="50" cy="50" r="45" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" />
          <circle cx="50" cy="50" r="35" fill="none" stroke="#e2be84" stroke-width="0.25" opacity="0.4" />
          <defs>
            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e2be84" />
              <stop offset="100%" stop-color="transparent" />
            </linearGradient>
          </defs>
        </svg>
        <svg viewBox="0 0 100 100" class="compass-dial" style="position: absolute; inset: 0;">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#e2be84" stroke-width="1.2" />
        </svg>
      </div>

      <div class="editorial-layout">
        <div class="scene-meta s2-meta">THE LANGUAGE</div>
        <div class="masked-line-wrapper">
          <div class="masked-text-line s2-line-1">They speak in soft nudges,</div>
        </div>
        <div class="masked-line-wrapper">
          <div class="masked-text-line s2-line-2 highlight">quiet breaths,</div>
        </div>
        <div class="masked-line-wrapper">
          <div class="masked-text-line s2-line-3">and loyal eyes.</div>
        </div>
      </div>
    </div>


    <!-- ========================================== -->
    <!-- SCENE 3: BOUNDLESS WONDER (8.0s - 12.4s) -->
    <!-- ========================================== -->
    <div
      id="scene-3"
      class="clip scene-clip"
      data-start="8.0"
      data-duration="4.4"
      data-track-index="1"
    >
      <div class="plate-container s3-plate">
        <img class="plate-img" src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/dogs-story/1780426005913_zd0c4ih5cq_dog_wonder.png" alt="" />
        <div class="scenic-vignette"></div>
      </div>

      <!-- Subtle floating sparkles VFX overlay -->
      <div class="particle-container s3-particles" aria-hidden="true">
        <div class="sparkle-dot dot-1" style="left: 15%; bottom: 40%"></div>
        <div class="sparkle-dot dot-2" style="left: 28%; bottom: 60%"></div>
        <div class="sparkle-dot dot-3" style="left: 55%; bottom: 75%"></div>
        <div class="sparkle-dot dot-4" style="left: 72%; bottom: 50%"></div>
        <div class="sparkle-dot dot-5" style="left: 85%; bottom: 65%"></div>
      </div>

      <div class="editorial-layout">
        <div class="scene-meta s3-meta">THE MAGIC</div>
        <div class="masked-line-wrapper">
          <div class="masked-text-line s3-line-1">Finding endless wonder</div>
        </div>
        <div class="masked-line-wrapper">
          <div class="masked-text-line s3-line-2 highlight">in the simplest</div>
        </div>
        <div class="masked-line-wrapper">
          <div class="masked-text-line s3-line-3">moments.</div>
        </div>
      </div>
    </div>


    <!-- ========================================== -->
    <!-- SCENE 4: COZY COMFORT (12.0s - 16.4s) -->
    <!-- ========================================== -->
    <div
      id="scene-4"
      class="clip scene-clip"
      data-start="12.0"
      data-duration="4.4"
      data-track-index="2"
    >
      <div class="plate-container s4-plate">
        <img class="plate-img" src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/dogs-story/1780426009861_tvnwmukedzl_dog_cozy.png" alt="" />
        <div class="scenic-vignette"></div>
      </div>

      <!-- Warming fireplace amber pulse overlay -->
      <div class="fireplace-glow s4-fire" aria-hidden="true"></div>

      <div class="editorial-layout">
        <div class="scene-meta s4-meta">THE SHELTER</div>
        <div class="masked-line-wrapper">
          <div class="masked-text-line s4-line-1">Through every storm,</div>
        </div>
        <div class="masked-line-wrapper">
          <div class="masked-text-line s4-line-2 highlight">a steady comfort</div>
        </div>
        <div class="masked-line-wrapper">
          <div class="masked-text-line s4-line-3">that never fades.</div>
        </div>
      </div>
    </div>


    <!-- ========================================== -->
    <!-- SCENE 5: THE OUTRO / END CARD (16.0s - 20.0s) -->
    <!-- ========================================== -->
    <div
      id="scene-5"
      class="clip scene-clip"
      data-start="16.0"
      data-duration="4.0"
      data-track-index="1"
    >
      <!-- Heavily blurred cozy background to transition elegantly -->
      <div class="plate-container s5-plate" style="filter: blur(16px) brightness(0.35);">
        <img class="plate-img" src="https://pub-e3bfc0083b0644b296a7080b21024c5f.r2.dev/dogs-story/1780426009861_tvnwmukedzl_dog_cozy.png" alt="" />
        <div class="scenic-vignette" style="background: rgba(13, 12, 15, 0.7);"></div>
      </div>

      <!-- End Card Center Layout -->
      <div class="end-card-layout">
        <!-- Elegant Geometric SVG Logo Outline -->
        <div class="logo-container s5-logo">
          <svg viewBox="0 0 100 100" width="160" height="160" style="filter: drop-shadow(0 0 16px rgba(226, 190, 132, 0.35));">
            <!-- Heart and dog ears outline combined -->
            <path class="logo-path" d="M32 54 C32 42, 45 32, 50 42 C55 32, 68 42, 68 54 C68 68, 50 82, 50 82 C50 82, 32 68, 32 54 Z" stroke="#e2be84" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            <path class="logo-path" d="M41 42 C36 33, 27 36, 29 45" stroke="#e2be84" stroke-width="2.2" stroke-linecap="round" fill="none" />
            <path class="logo-path" d="M59 42 C64 33, 73 36, 71 45" stroke="#e2be84" stroke-width="2.2" stroke-linecap="round" fill="none" />
            <path class="logo-path" d="M44 58 C44 58, 50 63, 56 58" stroke="#e2be84" stroke-width="1.8" stroke-linecap="round" fill="none" />
            <!-- Inner nose piece -->
            <polygon class="logo-path-nose" points="47,51 53,51 50,55" fill="#e2be84" />
          </svg>
        </div>

        <div class="end-divider s5-div"></div>
        <div class="end-headline s5-head">Forever loyal.</div>
        <div class="end-sub s5-sub">Start now.</div>
      </div>
    </div>

  </div>

  <script src="./vendor/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};

    const tl = gsap.timeline({ paused: true });

    // Initialize/reset starting values to ensure perfect determinism upon seeks
    gsap.set(".scene-clip", { opacity: 0, visibility: "hidden" });
    gsap.set(".plate-container", { scale: 1.12, x: 0, y: 0 });

    // ==========================================
    // CHOREOGRAPHY PIPELINE
    // ==========================================

    // ------------------------------------------
    // BEAT 1: THE OPENER (0.0s - 4.2s)
    // ------------------------------------------
    tl.addLabel("s1-start", 0);
    
    // Set Clip Active with a smooth 0.6s fade-in transition
    tl.set("#scene-1", { opacity: 0, visibility: "visible" }, 0);
    tl.to("#scene-1", { opacity: 1, duration: 0.6, ease: "power2.out" }, 0);
    
    // Camera drift & zoom (unbounded is illegal, finite 4.2s pan)
    tl.to(".s1-plate", {
      scale: 1.04,
      x: -25,
      y: 15,
      duration: 4.2,
      ease: "power1.out"
    }, "s1-start");

    // Line accent expand
    tl.to(".s1-frame", {
      opacity: 1,
      scale: 1.0,
      duration: 1.2,
      ease: "power2.out"
    }, "s1-start+=0.3");

    // Typographic reveals (Fast, premium, settled by 0.8s)
    tl.to(".s1-meta", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, "s1-start+=0.2");
    tl.to(".s1-line-1", { opacity: 1, y: 0, rotate: 0, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.2)" }, "s1-start+=0.3");
    tl.to(".s1-line-2", { opacity: 1, y: 0, rotate: 0, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.2)" }, "s1-start+=0.4");

    // Scene transition out: camera zoom rack blur crossfade
    tl.to("#scene-1", { opacity: 0, filter: "blur(10px)", duration: 0.5, ease: "power2.inOut" }, 3.7);
    tl.to(".s1-plate", { scale: 1.15, duration: 0.5, ease: "power2.in" }, 3.7);


    // ------------------------------------------
    // BEAT 2: THE SILENT BOND (3.8s - 8.4s)
    // ------------------------------------------
    tl.addLabel("s2-start", 3.8);

    // Fade and scale in Scene 2
    tl.set("#scene-2", { opacity: 1, visibility: "visible" }, 3.8);
    tl.fromTo("#scene-2", 
      { opacity: 0, filter: "blur(10px)" },
      { opacity: 1, filter: "blur(0px)", duration: 0.5, ease: "power2.inOut" }, 
      3.8
    );

    // Camera Drift
    tl.to(".s2-plate", {
      scale: 1.03,
      x: 20,
      y: -20,
      duration: 4.6,
      ease: "power1.out"
    }, "s2-start");

    // Dial rotate & scale
    tl.to(".compass-dial-container", {
      opacity: 1,
      scale: 1.0,
      duration: 1.4,
      ease: "power3.out"
    }, "s2-start+=0.2");
    
    tl.to(".compass-dial", {
      rotation: 60,
      duration: 4.6,
      ease: "power1.out"
    }, "s2-start");

    tl.to(".compass-ring-solid", {
      rotation: -45,
      duration: 4.6,
      ease: "power1.out"
    }, "s2-start");

    // Text reveals (settled by 4.5s, highly readable at 5.0s checkpoint)
    tl.to(".s2-meta", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, "s2-start+=0.2");
    tl.to(".s2-line-1", { opacity: 1, y: 0, rotate: 0, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.2)" }, "s2-start+=0.3");
    tl.to(".s2-line-2", { opacity: 1, y: 0, rotate: 0, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.2)" }, "s2-start+=0.4");
    tl.to(".s2-line-3", { opacity: 1, y: 0, rotate: 0, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.2)" }, "s2-start+=0.5");

    // Exit transition
    tl.to("#scene-2", { opacity: 0, filter: "blur(10px)", duration: 0.5, ease: "power2.inOut" }, 7.9);
    tl.to(".s2-plate", { scale: 1.15, duration: 0.5, ease: "power2.in" }, 7.9);


    // ------------------------------------------
    // BEAT 3: BOUNDLESS WONDER (8.0s - 12.4s)
    // ------------------------------------------
    tl.addLabel("s3-start", 8.0);

    tl.set("#scene-3", { opacity: 1, visibility: "visible" }, 8.0);
    tl.fromTo("#scene-3",
      { opacity: 0, filter: "blur(10px)" },
      { opacity: 1, filter: "blur(0px)", duration: 0.5, ease: "power2.inOut" },
      8.0
    );

    // Camera move (wonder)
    tl.to(".s3-plate", {
      scale: 1.05,
      x: -30,
      y: -10,
      duration: 4.4,
      ease: "power1.out"
    }, "s3-start");

    // Sparkles float
    tl.to(".s3-particles", { opacity: 1, duration: 0.8 }, "s3-start+=0.1");
    
    // Animate individual sparkles rising and fading gently
    const sparkles = [".dot-1", ".dot-2", ".dot-3", ".dot-4", ".dot-5"];
    sparkles.forEach((sparkle, i) => {
      tl.fromTo(sparkle,
        { opacity: 0, y: 30, scale: 0.5 },
        {
          opacity: 0.85,
          y: -80,
          scale: 1.2,
          duration: 2.2 + i * 0.2,
          ease: "power1.out"
        },
        `s3-start+=${0.3 + i * 0.15}`
      );
    });

    // Typography reveals (settled by 8.7s, highly readable at 10.0s checkpoint)
    tl.to(".s3-meta", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, "s3-start+=0.2");
    tl.to(".s3-line-1", { opacity: 1, y: 0, rotate: 0, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.2)" }, "s3-start+=0.3");
    tl.to(".s3-line-2", { opacity: 1, y: 0, rotate: 0, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.2)" }, "s3-start+=0.4");
    tl.to(".s3-line-3", { opacity: 1, y: 0, rotate: 0, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.2)" }, "s3-start+=0.5");

    // Exit transition
    tl.to("#scene-3", { opacity: 0, filter: "blur(10px)", duration: 0.5, ease: "power2.inOut" }, 11.9);
    tl.to(".s3-plate", { scale: 1.15, duration: 0.5, ease: "power2.in" }, 11.9);


    // ------------------------------------------
    // BEAT 4: COZY COMFORT (12.0s - 16.4s)
    // ------------------------------------------
    tl.addLabel("s4-start", 12.0);

    tl.set("#scene-4", { opacity: 1, visibility: "visible" }, 12.0);
    tl.fromTo("#scene-4",
      { opacity: 0, filter: "blur(10px)" },
      { opacity: 1, filter: "blur(0px)", duration: 0.5, ease: "power2.inOut" },
      12.0
    );

    // Camera breathe
    tl.to(".s4-plate", {
      scale: 1.04,
      x: 15,
      y: 20,
      duration: 4.4,
      ease: "power1.out"
    }, "s4-start");

    // Fireplace flicker pulse (gentle finite repeats)
    tl.to(".s4-fire", { opacity: 1, duration: 0.8 }, "s4-start+=0.1");
    tl.to(".s4-fire", {
      opacity: 0.6,
      scale: 1.1,
      duration: 1.0,
      yoyo: true,
      repeat: 2,
      ease: "sine.inOut"
    }, "s4-start+=1.0");

    // Typography reveals (settled by 12.7s, highly readable at 14.0s checkpoint)
    tl.to(".s4-meta", { opacity: 1, y: 0, duration: 0.5, ease: "power2.out" }, "s4-start+=0.2");
    tl.to(".s4-line-1", { opacity: 1, y: 0, rotate: 0, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.2)" }, "s4-start+=0.3");
    tl.to(".s4-line-2", { opacity: 1, y: 0, rotate: 0, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.2)" }, "s4-start+=0.4");
    tl.to(".s4-line-3", { opacity: 1, y: 0, rotate: 0, filter: "blur(0px)", duration: 0.6, ease: "back.out(1.2)" }, "s4-start+=0.5");

    // Exit transition
    tl.to("#scene-4", { opacity: 0, filter: "blur(10px)", duration: 0.5, ease: "power2.inOut" }, 15.9);
    tl.to(".s4-plate", { scale: 1.15, duration: 0.5, ease: "power2.in" }, 15.9);


    // ------------------------------------------
    // BEAT 5: OUTRO / END CARD (16.0s - 20.0s)
    // ------------------------------------------
    tl.addLabel("s5-start", 16.0);

    tl.set("#scene-5", { opacity: 1, visibility: "visible" }, 16.0);
    tl.fromTo("#scene-5",
      { opacity: 0 },
      { opacity: 1, duration: 0.6, ease: "power2.out" },
      16.0
    );

    // Super slow zoom out background
    tl.to(".s5-plate", {
      scale: 1.0,
      duration: 4.0,
      ease: "power1.out"
    }, "s5-start");

    // SVG Logo draw
    tl.to(".s5-logo", {
      opacity: 1,
      scale: 1.0,
      duration: 1.2,
      ease: "power3.out"
    }, "s5-start+=0.2");

    tl.to(".logo-path", {
      strokeDashoffset: 0,
      duration: 1.5,
      ease: "power2.inOut"
    }, "s5-start+=0.3");

    tl.to(".logo-path-nose", {
      opacity: 1,
      scale: 1.0,
      duration: 0.5,
      ease: "back.out(1.5)"
    }, "s5-start+=1.1");

    // Divider bar
    tl.to(".s5-div", {
      opacity: 1,
      scaleX: 1.0,
      duration: 1.0,
      ease: "power3.out"
    }, "s5-start+=0.6");

    // Final headline & subtext reveal (settled by 17.5s, highly readable at 18.0s checkpoint)
    tl.to(".s5-head", {
      opacity: 1,
      y: 0,
      filter: "blur(0px)",
      duration: 1.0,
      ease: "power4.out"
    }, "s5-start+=0.7");

    tl.to(".s5-sub", {
      opacity: 1,
      y: 0,
      duration: 0.9,
      ease: "power3.out"
    }, "s5-start+=1.0");

    // Safe end handle for preview hold
    tl.to(".global-frame", {
      borderColor: "rgba(21, 20, 25, 1.0)",
      duration: 0.1
    }, 19.9);

    // Register active seek timeline with Hyperframes root
    window.__timelines.Main = tl;
  </script>
</body>
</html>
